<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOFACE RECORDS</title>
    <style>
        :root { --bg: #000; --text: #fff; --accent: #111; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', Helvetica, Arial, sans-serif; margin: 0; overflow-x: hidden; }
        
        /* TOP NAV */
        nav { padding: 20px 4%; display: flex; justify-content: space-between; align-items: center; }
        .logo-nav { font-weight: 900; letter-spacing: 0.4em; font-size: 14px; }
        .nav-items { display: flex; gap: 20px; font-size: 10px; font-weight: 600; letter-spacing: 1px; opacity: 0.7; }

        /* MAIN HERO - BIG FONT */
        .hero { padding: 80px 4% 40px 4%; border-bottom: 1px solid #222; }
        .hero h1 { 
            font-size: clamp(5rem, 18vw, 15rem); 
            font-weight: 900; 
            margin: 0; 
            line-height: 0.85; 
            letter-spacing: -0.04em;
            text-transform: uppercase;
        }
        .hero p { font-size: 14px; opacity: 0.6; margin-top: 30px; max-width: 400px; line-height: 1.4; text-transform: none; }

        /* LATEST CATALOG SECTION */
        .catalog-section { padding: 40px 4%; }
        .section-bar { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 30px; }
        .section-bar span { font-size: 14px; font-weight: 800; }

        .release-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: #080808; padding: 15px; border: 1px solid #111; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; margin-bottom: 15px; }
        .card-meta { font-size: 12px; font-weight: 800; letter-spacing: 1px; }
        .card-sub { font-size: 10px; opacity: 0.4; margin-top: 5px; }

        /* SOCIAL FOOTER */
        footer { padding: 60px 4%; border-top: 1px solid #222; display: flex; flex-direction: column; align-items: center; gap: 30px; margin-top: 100px; }
        .social-links { display: flex; gap: 30px; }
        .social-links a { color: #fff; text-decoration: none; font-size: 12px; font-weight: 700; letter-spacing: 2px; border: 1px solid #222; padding: 12px 25px; transition: 0.2s; }
        .social-links a:hover { background: #fff; color: #000; }
    </style>
</head>
<body>

    <nav>
        <div class="logo-nav">NOFACE</div>
        <div class="nav-items">
            <span>LABEL</span>
            <span>MIM</span>
            <span>DEMOS</span>
        </div>
    </nav>

    <div class="hero">
        <h1>NOFACE<br>RECORDS.</h1>
        <p>A global imprint for elite dance music. Pushing the boundaries of the underground.</p>
    </div>

    <div class="catalog-section">
        <div class="section-bar">
            <span>Latest Catalog</span>
        </div>
        
        <div class="release-grid">
            <div class="card">
                <img src="https://res.cloudinary.com/dlrqcpsgi/image/upload/v1710780000/ibiza-cover.jpg" alt="Ibiza 2000">
                <div class="card-meta">NFR487</div>
                <div class="card-sub">IBIZA 2000</div>
            </div>
            
            <div class="card">
                <div style="width:100%; aspect-ratio:1/1; background:#111; display:flex; align-items:center; justify-content:center; color:#222; font-weight:900;">NFXXX</div>
                <div class="card-meta">NFXXX</div>
                <div class="card-sub">COMING SOON</div>
            </div>
        </div>
    </div>

    <footer>
        <div class="social-links">
            <a href="https://instagram.com/nofacerecords" target="_blank">INSTAGRAM</a>
            <a href="https://youtube.com/nofacerecords" target="_blank">YOUTUBE</a>
        </div>
        <div style="font-size: 9px; opacity: 0.2; letter-spacing: 2px;">© NOFACE RECORDS</div>
    </footer>

</body>
</html>
