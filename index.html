<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOFACE RECORDS</title>
    <style>
        :root { --bg: #000; --text: #fff; --accent: #111; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', Helvetica, Arial, sans-serif; margin: 0; overflow-x: hidden; }
        
        /* TOP NAV */
        nav { padding: 25px 5%; display: flex; justify-content: space-between; align-items: center; }
        .logo-nav { font-weight: 900; letter-spacing: 0.4em; font-size: 14px; }
        .nav-items { display: flex; gap: 20px; font-size: 10px; font-weight: 600; letter-spacing: 1px; opacity: 0.7; }

        /* MAIN HERO - THE BIG LOGO STACKED */
        .hero { padding: 80px 5% 40px 5%; border-bottom: 1px solid #222; }
        .hero h1 { 
            font-size: clamp(5rem, 18vw, 15rem); 
            font-weight: 900; 
            margin: 0; 
            line-height: 0.85; 
            letter-spacing: -0.04em;
            text-transform: uppercase;
        }
        .hero p { font-size: 14px; opacity: 0.6; margin-top: 30px; max-width: 420px; line-height: 1.4; text-transform: none; }

        /* CATALOG SECTION */
        .catalog { padding: 50px 5%; }
        .section-bar { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 40px; }
        .section-bar span { font-size: 14px; font-weight: 800; text-transform: uppercase; }

        .release-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        
        /* CLICKABLE RELEASE CARD */
        .release-link { text-decoration: none; color: inherit; display: block; }
        .card { background: #080808; padding: 15px; border: 1px solid #111; transition: 0.3s; }
        .card:hover { border-color: #444; background: #0c0c0c; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; margin-bottom: 15px; }
        .card-meta { font-size: 13px; font-weight: 900; letter-spacing: 1px; }
        .card-sub { font-size: 10px; opacity: 0.4; margin-top: 5px; }

        /* FOOTER SOCIALS */
        footer { padding: 100px 5% 60px 5%; border-top: 1px solid #111; display: flex; flex-direction: column; align-items: center; gap: 40px; }
        .social-links { display: flex; gap: 30px; }
        .social-links a { 
            color: #fff; 
            text-decoration: none; 
            font-size: 11px; 
            font-weight: 800; 
            letter-spacing: 3px; 
            border: 1px solid #222; 
            padding: 15px 35px; 
            transition: 0.3s; 
        }
        .social-links a:hover { background: #fff; color: #000; border-color: #fff; }
        .copy { font-size: 9px; opacity: 0.2; letter-spacing: 2px; margin-top: 20px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo-nav">NOFACE</div>
        <div class="nav-items">
            <span>LABEL</span>
            <span>MIM</span>
            <span>DEMOS</span>
        </div>
    </nav>

    <div class="hero">
        <h1>NOFACE<br>RECORDS.</h1>
        <p>A global imprint for elite dance music. Pushing the boundaries of the underground.</p>
    </div>

    <div class="catalog">
        <div class="section-bar">
            <span>Latest Catalog</span>
        </div>
        
        <div class="release-grid">
            <a href="https://ffm.to/ibiza2000" class="release-link" target="_blank">
                <div class="card">
