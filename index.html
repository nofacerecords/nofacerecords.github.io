<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOFACE RECORDS | Official</title>
    <style>
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --text: #ffffff;
            --border: #333333;
            --accent: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            letter-spacing: -0.02em;
            overflow-x: hidden;
        }

        /* Elite Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 5%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            text-decoration: none;
            color: white;
        }

        .nav-links a {
            color: #888;
            text-decoration: none;
            margin-left: 25px; /* Tightened for more links */
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 600;
            transition: 0.4s;
        }

        .nav-links a:hover {
            color: var(--accent);
        }

        /* Hero */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 5%;
            border-bottom: 1px solid var(--border);
        }

        .hero h1 {
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 900;
            line-height: 0.9;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 1.1rem;
            color: #888;
            max-width: 500px;
            margin-bottom: 40px;
        }

        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: var(--accent);
            color: var(--bg);
            text-decoration: none;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            transition: 0.3s;
            width: fit-content;
        }

        .btn:hover {
            background: #ccc;
            transform: translateY(-2px);
        }

        /* Catalog Section */
        .section {
            padding: 100px 5%;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 60px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        .section-header h2 {
            font-size: 2rem;
            text-transform: uppercase;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }

        .release-link {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 20px;
            transition: all 0.3s ease;
        }

        .card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            filter: grayscale(100%);
            margin-bottom: 20px;
            transition: 0.5s ease;
            display: block;
        }

        .release-link:hover .card {
            border-color: #ffffff;
            transform: translateY(-5px);
        }

        .release-link:hover img {
            filter: grayscale(0%);
        }

        footer {
            padding: 60px 5%;
            border-top: 1px solid var(--border);
            color: #444;
            text-align: center;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="logo">NOFACE</a>
        <div class="nav-links">
            <a href="/">Label</a>
            <a href="/academy">Academy</a>
            <a href="/musicindustrymeetups">MIM</a>
            <a href="mailto:demos@nofacerecords.com">Demos</a>
        </div>
    </nav>

    <header class="hero">
        <h1>NOFACE<br>RECORDS.</h1>
        <p>A global imprint for elite dance music. Pushing the boundaries of the underground.</p>
        <a href="/academy" class="btn">Enter Academy</a>
    </header>

    <section class="section" id="catalog">
        <div class="section-header">
            <h2>Latest Catalog</h2>
            <span>2026 Season</span>
        </div>
        
        <div class="grid">
            <a href="https://fanlink.tv/NFR487" target="_blank" class="release-link">
                <div class="card">
                    <img src="https://www.dropbox.com/scl/fi/5b6nb5vv5c6nf5y7xhlan/NFR487-IBIZA-2000.jpg?rlkey=6fon6yhip84uho2ozpli09czw&st=6ab48cnp&raw=1" alt="NFR487 Ibiza 2000">
                    <h3>NFR487</h3>
                    <p>Ibiza 2000</p>
                </div>
            </a>
        </div>
    </section>

    <footer>
        &copy; 2026 NOFACE RECORDS & ACADEMY // LONDON - TOKYO - NEW YORK
    </footer>

</body>
</html>
