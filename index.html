<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOFACE RECORDS | Official</title>
    <style>
        :root { --bg: #000; --text: #fff; --accent: #222; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; text-transform: uppercase; overflow-x: hidden; }
        
        nav { padding: 30px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--accent); position: sticky; top: 0; background: #000; z-index: 100; }
        .logo { font-weight: 900; letter-spacing: 0.6em; font-size: 16px; text-decoration: none; color: #fff; }

        .hero { 
            height: 85vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            padding: 0 5%; 
            border-bottom: 1px solid var(--accent); 
            background: linear-gradient(to top, #000 5%, transparent 95%), 
                        url('https://res.cloudinary.com/dlrqcpsgi/image/upload/v1/dubai-cover.jpg');
            background-size: cover;
            background-position: center;
        }
        .hero p { font-size: 11px; letter-spacing: 10px; color: #fff; margin-bottom: 10px; opacity: 0.8; }
        .hero h1 { font-size: clamp(4rem, 18vw, 15rem); font-weight: 900; margin: 0; line-height: 0.75; letter-spacing: -6px; }

        footer { padding: 80px 5%; border-top: 1px solid var(--accent); display: flex; flex-direction: column; align-items: center; gap: 30px; }
        .social-links { display: flex; gap: 40px; }
        .social-links a { color: #fff; text-decoration: none; font-size: 11px; letter-spacing: 4px; border: 1px solid var(--accent); padding: 15px 30px; transition: 0.3s; }
        .social-links a:hover { background: #fff; color: #000; border-color: #fff; }
        .copyright { font-size: 9px; color: #333; letter-spacing: 2px; margin-top: 40px; }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="logo">NOFACE</a>
    </nav>

    <div class="hero">
        <p>Featured Release</p>
        <h1>DUBAI</h1>
    </div>

    <footer>
        <div class="social-links">
            <a href="https://instagram.com/nofacerecords" target="_blank">Instagram</a>
            <a href="https://youtube.com/nofacerecords" target="_blank">YouTube</a>
        </div>
        <div class="copyright">© NOFACE RECORDS — ALL RIGHTS RESERVED</div>
    </footer>

</body>
</html>
