<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIM | Industry Meetups</title>
    <script src="https://product-gallery.cloudinary.com/all.js" type="text/javascript"></script>
    <style>
        :root { --bg: #000; --text: #fff; --border: #333; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; }
        
        nav { padding: 25px 5%; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .logo { font-weight: 800; letter-spacing: 0.3em; text-decoration: none; color: #fff; }

        .admin-header { padding: 60px 5%; background: #0a0a0a; border-bottom: 1px solid var(--border); }
        h1 { font-size: 2rem; text-transform: uppercase; }
        
        /* Event Tabs */
        .event-tabs { padding: 20px 5%; display: flex; gap: 20px; }
        .tab { padding: 10px 20px; border: 1px solid var(--border); cursor: pointer; text-transform: uppercase; font-size: 12px; }
        .tab:hover { background: #fff; color: #000; }

        #gallery-container { padding: 20px 5%; min-height: 500px; }
    </style>
</head>
<body>

    <nav><a href="/" class="logo">NOFACE</a></nav>

    <div class="admin-header">
        <h1>Event Media Manager</h1>
        <p style="color:#666; font-size: 12px;">Select an event below to view/manage photos.</p>
    </div>

    <div class="event-tabs">
        <div class="tab" onclick="loadGallery('dubai2024')">Dubai July 2024</div>
        <div class="tab" onclick="loadGallery('future-event')">Next Event</div>
    </div>

    <div id="gallery-container"></div>

    <script type="text/javascript">  
        function loadGallery(eventTag) {
            document.getElementById('gallery-container').innerHTML = ""; // Clear current
            const myGallery = cloudinary.galleryWidget({ 
                container: "#gallery-container", 
                cloudName: "YOUR_NAME", // You'll get this in 1 minute
                mediaAssets: [{ tag: eventTag }], 
                displayProps: { mode: "masonry", columns: 4, spacing: 10 },
                zoomProps: { type: "popup" }
            }); 
            myGallery.render(); 
        }
        
        // Load Dubai by default
        loadGallery('dubai2024');
    </script> 
</body>
</html>
