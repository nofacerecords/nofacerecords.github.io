<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIM | Media Manager</title>
    <script src="https://product-gallery.cloudinary.com/all.js" type="text/javascript"></script>
    <style>
        :root { --bg: #000; --text: #fff; --border: #222; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        
        nav { padding: 20px 5%; border-bottom: 1px solid var(--border); background: #000; display: flex; align-items: center; }
        .logo { font-weight: 800; letter-spacing: 0.3em; text-decoration: none; color: #fff; font-size: 14px; text-transform: uppercase; }
        
        .hero { padding: 100px 5% 60px; border-bottom: 1px solid var(--border); background: linear-gradient(to bottom, #050505, #000); }
        .hero p { color: #666; letter-spacing: 5px; font-size: 10px; margin-bottom: 15px; text-transform: uppercase; }
        .hero h1 { font-size: clamp(3.5rem, 12vw, 8rem); font-weight: 900; margin: 0; line-height: 0.8; text-transform: uppercase; letter-spacing: -2px; }

        .event-tabs { padding: 20px 5%; display: flex; gap: 10px; background: #000; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
        .tab { padding: 12px 24px; border: 1px solid var(--border); cursor: pointer; text-transform: uppercase; font-size: 10px; letter-spacing: 2px; transition: 0.3s; color: #555; }
        .tab.active { background: #fff; color: #000; border-color: #fff; font-weight: bold; }
        .tab:hover:not(.active) { border-color: #555; color: #fff; }

        #gallery-container { padding: 40px 5%; min-height: 100vh; width: 100%; box-sizing: border-box; }
        
        footer { padding: 80px 5%; text-align: center; color: #222; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

    <nav><a href="/" class="logo">NOFACE</a></nav>

    <div class="hero">
        <p id="event-date">JULY 2024</p>
        <h1 id="event-title">DUBAI</h1>
    </div>

    <div class="event-tabs">
        <div id="btn-dubai" class="tab active" onclick="updateView('DUBAI', 'JULY 2024', 'dubai2024', this)">Dubai</div>
        <div id="btn-london" class="tab" onclick="updateView('LONDON', 'COMING SOON', 'london2024', this)">London</div>
    </div>

    <div id="gallery-container"></div>

    <footer>&copy; 2026 NOFACE RECORDS</footer>
