<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIM | Music Industry Meetups</title>
    <style>
        :root { --bg: #000000; --text: #ffffff; --border: #333333; --accent: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, sans-serif; letter-spacing: -0.02em; }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 25px 5%; position: fixed; width: 100%; top: 0; z-index: 1000; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); }
        .logo { font-size: 1.1rem; font-weight: 800; letter-spacing: 0.3em; text-transform: uppercase; text-decoration: none; color: white; }
        .nav-links a { color: #888; text-decoration: none; margin-left: 20px; font-size: 0.75rem; text-transform: uppercase; transition: 0.4s; }
        .nav-links a:hover { color: var(--accent); }

        .hero { height: 40vh; display: flex; flex-direction: column; justify-content: center; padding: 0 5%; border-bottom: 1px solid var(--border); margin-top: 80px; }
        .hero h1 { font-size: clamp(3rem, 10vw, 6rem); font-weight: 900; text-transform: uppercase; line-height: 0.9; letter-spacing: -0.04em; }

        .section { padding: 60px 5%; }
        .section-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .section-header h2 { font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; }
        
        /* 3-COLUMN GALLERY GRID */
        .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        
        @media (max-width: 800px) { .gallery-grid { grid-template-columns: 1fr; } }

        .event-card { border: 1px solid var(--border); padding: 10px; background: #050505; transition: 0.3s; }
        .event-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; filter: grayscale(100%); transition: 0.6s; margin-bottom: 10px; display: block; }
        .event-card:hover { border-color: #fff; }
        .event-card:hover img { filter: grayscale(0%); }
        
        .event-card h3 { font-size: 0.85rem; text-transform: uppercase; margin-bottom: 5px; }
        .event-card p { color: #666; font-size: 0.7rem; text-transform: uppercase; }

        footer { padding: 60px 5%; color: #444; text-align: center; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 3px; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="logo">NOFACE</a>
        <div class="nav-links">
            <a href="/">Label</a>
            <a href="/academy">Academy</a>
            <a href="/musicindustrymeetups">MIM</a>
            <a href="mailto:demos@nofacerecords.com">Demos</a>
        </div>
    </nav>

    <header class="hero">
        <h1>OUR EVENTS.</h1>
    </header>

    <section class="section">
        <div class="section-header">
            <h2>MIM DUBAI</h2>
            <span>HUTONG // JULY 2024</span>
        </div>
        <div class="gallery-grid">
            <div class="event-card">
                <div style="width:100%; aspect-ratio:16/9; background:#111; margin-bottom:10px; display:flex; align-items:center; justify-content:center; color:#333;">[PHOTO 1]</div>
                <h3>The Gathering</h3>
                <p>Networking Session</p>
            </div>
            <div class="event-card">
                <div style="width:100%; aspect-ratio:16/9; background:#111; margin-bottom:10px; display:flex; align-items:center; justify-content:center; color:#333;">[PHOTO 2]</div>
                <h3>Creative Exchange</h3>
                <p>Artist Showcase</p>
            </div>
            <div class="event-card">
                <div style="width:100%; aspect-ratio:16/9; background:#111; margin-bottom:10px; display:flex; align-items:center; justify-content:center; color:#333;">[PHOTO 3]</div>
                <h3>Industry Pulse</h3>
                <p>Executive Lounge</p>
            </div>
        </div>
    </section>

    <footer>&copy; 2026 NOFACE RECORDS</footer>

</body>
</html>
