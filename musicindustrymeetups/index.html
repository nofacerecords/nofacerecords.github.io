<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIM | Media Manager</title>
    <style>
        :root { --bg: #000; --text: #fff; --border: #222; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        
        nav { padding: 20px 5%; border-bottom: 1px solid var(--border); background: #000; display: flex; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 800; letter-spacing: 0.3em; text-decoration: none; color: #fff; font-size: 14px; text-transform: uppercase; }
        
        .event-hero { 
            position: relative; 
            height: 70vh; 
            width: 100%; 
            background: #050505;
            display: flex; 
            flex-direction: column; 
            justify-content: flex-end; 
            padding: 60px 5%; 
            box-sizing: border-box;
            background-size: cover;
            background-position: center;
        }
        .event-hero::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to top, rgba(0,0,0,1) 10%, transparent 90%); }
        
        .hero-content { position: relative; z-index: 10; }
        .hero-content p { color: #888; letter-spacing: 5px; font-size: 10px; margin-bottom: 10px; text-transform: uppercase; }
        .hero-content h1 { font-size: clamp(3.5rem, 12vw, 8rem); font-weight: 900; margin: 0; line-height: 0.8; text-transform: uppercase; letter-spacing: -2px; }

        .event-tabs { padding: 20px 5%; display: flex; gap: 10px; background: #000; border-bottom: 1px solid var(--border); position: sticky; top: 55px; z-index: 900; }
        .tab { padding: 12px 24px; border: 1px solid var(--border); cursor: pointer; text-transform: uppercase; font-size: 10px; letter-spacing: 2px; color: #555; transition: 0.3s; }
        .tab.active { background: #fff; color: #000; border-color: #fff; font-weight: bold; }

        .gallery-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 15px; 
            padding: 40px 5%; 
        }
        .gallery-item { width: 100%; aspect-ratio: 1/1; background: #111; object-fit: cover; border: 1px solid #222; cursor: pointer; transition: 0.3s; }
        .gallery-item:hover { filter: brightness(1.2); }
    </style>
</head>
<body>

    <nav><a href="/" class="logo">NOFACE</a></nav>

    <div id="hero-bg" class="event-hero" style="background-image: url('https://res.cloudinary.com/dlrqcpsgi/image/upload/v1/dubai-cover.jpg');">
        <div class="hero-content">
            <p id="event-date">JULY 2024</p>
            <h1 id="event-title">DUBAI</h1>
        </div>
    </div>

    <div class="event-tabs">
        <div id="btn-dubai" class="tab active" onclick="updateView('DUBAI', 'JULY 2024', this)">Dubai</div>
        <div id="btn-london" class="tab" onclick="updateView('LONDON', 'COMING SOON', this)">London</div>
    </div>

    <div id="gallery-container" class="gallery-grid">
        </div>

    <script>
        function updateView(title, date, element) {
            document.getElementById('event-title').innerText = title;
            document.getElementById('event-date').innerText = date;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            element.classList.add('active');

            // For now, let's just make sure the UI works. 
            // We will connect the images once the cover is back.
        }
    </script>
</body>
</html>
