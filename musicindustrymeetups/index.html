<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIM | Media Manager</title>
    <style>
        :root { --bg: #000; --text: #fff; --border: #222; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        nav { padding: 20px 5%; border-bottom: 1px solid var(--border); background: #000; display: flex; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 800; letter-spacing: 0.3em; text-decoration: none; color: #fff; font-size: 14px; text-transform: uppercase; }
        
        .event-hero { 
            position: relative; 
            height: 75vh; 
            width: 100%; 
            background: #050505;
            display: flex; 
            flex-direction: column; 
            justify-content: flex-end; 
            padding: 60px 5%; 
            box-sizing: border-box;
            background-size: cover;
            background-position: center;
            /* DIRECT LINK TO YOUR RENAMED IMAGE */
            background-image: url('https://res.cloudinary.com/dlrqcpsgi/image/upload/dubai-cover.jpg');
        }
        .event-hero::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to top, rgba(0,0,0,1) 10%, transparent 90%); }
        
        .hero-content { position: relative; z-index: 10; }
        .hero-content p { color: #888; letter-spacing: 5px; font-size: 10px; margin-bottom: 10px; text-transform: uppercase; }
        .hero-content h1 { font-size: clamp(3.5rem, 12vw, 8rem); font-weight: 900; margin: 0; line-height: 0.8; text-transform: uppercase; letter-spacing: -2px; }

        .event-tabs { padding: 20px 5%; display: flex; gap: 10px; background: #000; border-bottom: 1px solid var(--border); position: sticky; top: 55px; z-index: 900; }
        .tab { padding: 12px 24px; border: 1px solid var(--border); cursor: pointer; text-transform: uppercase; font-size: 10px; letter-spacing: 2px; color: #555; }
        .tab.active { background: #fff; color: #000; border-color: #fff; font-weight: bold; }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 5px; padding: 5px; background: #000; }
        .gallery-item { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
    </style>
</head>
<body>

    <nav><a href="/" class="logo">NOFACE</a></nav>

    <div class="event-hero">
        <div class="hero-content">
            <p>JULY 2024</p>
            <h1>DUBAI</h1>
        </div>
    </div>

    <div class="event-tabs">
        <div class="tab active">Dubai</div>
        <div class="tab" style="opacity: 0.2;">London</div>
    </div>

    <div class="gallery-grid">
        <img src="https://res.cloudinary.com/dlrqcpsgi/image/upload/w_600,c_fill/dubai-cover.jpg" class="gallery-item">
    </div>

</body>
</html>
