<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIM | Events</title>
    <style>
        :root { --bg: #000000; --text: #ffffff; --border: #333333; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 25px 5%; position: fixed; width: 100%; top: 0; z-index: 1000; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); }
        .logo { font-size: 1.1rem; font-weight: 800; letter-spacing: 0.3em; text-transform: uppercase; text-decoration: none; color: white; }
        .nav-links a { color: #888; text-decoration: none; margin-left: 20px; font-size: 0.75rem; text-transform: uppercase; }

        .hero { height: 40vh; display: flex; flex-direction: column; justify-content: center; padding: 0 5%; margin-top: 80px; }
        .hero h1 { font-size: clamp(3rem, 10vw, 6rem); font-weight: 900; text-transform: uppercase; letter-spacing: -0.04em; }

        .section { padding: 40px 5%; }
        .event-card { 
            position: relative;
            width: 100%;
            max-width: 800px;
            border: 1px solid var(--border);
            text-decoration: none;
            color: white;
            display: block;
            transition: 0.3s;
        }
        .event-card:hover { border-color: #fff; transform: translateY(-5px); }
        .event-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; filter: grayscale(100%); transition: 0.5s; }
        .event-card:hover img { filter: grayscale(0%); }
        .event-info { padding: 20px; background: #050505; }
        .event-info h3 { text-transform: uppercase; font-size: 1.2rem; margin-bottom: 5px; }
        .event-info p { color: #666; font-size: 0.8rem; text-transform: uppercase; }

        footer { padding: 60px 5%; text-align: center; color: #444; font-size: 0.6rem; text-transform: uppercase; border-top: 1px solid var(--border); }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">NOFACE</a>
        <div class="nav-links">
            <a href="/">Label</a>
            <a href="/academy">Academy</a>
            <a href="/musicindustrymeetups">MIM</a>
            <a href="mailto:demos@nofacerecords.com">Demos</a>
        </div>
    </nav>

    <header class="hero">
        <h1>OUR EVENTS.</h1>
    </header>

    <section class="section">
        <a href="/musicindustrymeetups/dubai-july-2024" class="event-card">
            <img src="https://www.dropbox.com/scl/fi/8r5i3nct759b7m8p91vbe/MIM-Dubai-1.jpg?rlkey=l67hkc6uujp0luurwoq5dlopt&raw=1" alt="Dubai">
            <div class="event-info">
                <h3>Hutong, Dubai</h3>
                <p>July 2024 // View Gallery</p>
            </div>
        </a>
    </section>

    <footer>&copy; 2026 NOFACE RECORDS</footer>
</body>
</html>
