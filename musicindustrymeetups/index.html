<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIM | Media Manager</title>
    <script src="https://product-gallery.cloudinary.com/all.js" type="text/javascript"></script>
    <style>
        :root { --bg: #000; --text: #fff; --border: #222; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; }
        
        nav { padding: 20px 5%; border-bottom: 1px solid var(--border); background: #000; display: flex; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 800; letter-spacing: 0.3em; text-decoration: none; color: #fff; font-size: 14px; text-transform: uppercase; }
        
        /* THE COVER IMAGE SECTION */
        .event-hero { 
            position: relative; 
            height: 60vh; 
            width: 100%; 
            background: #111;
            display: flex; 
            flex-direction: column; 
            justify-content: flex-end; 
            padding: 60px 5%; 
            box-sizing: border-box;
            background-size: cover;
            background-position: center;
            transition: 0.5s ease-in-out;
        }
        .event-hero::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to top, rgba(0,0,0,1), transparent); }
        
        .hero-content { position: relative; z-index: 10; }
        .hero-content p { color: #aaa; letter-spacing: 5px; font-size: 10px; margin-bottom: 10px; text-transform: uppercase; }
        .hero-content h1 { font-size: clamp(3.5rem, 12vw, 8rem); font-weight: 900; margin: 0; line-height: 0.8; text-transform: uppercase; }

        .event-tabs { padding: 20px 5%; display: flex; gap: 10px; background: #000; border-bottom: 1px solid var(--border); }
        .tab { padding: 12px 24px; border: 1px solid var(--border); cursor: pointer; text-transform: uppercase; font-size: 10px; letter-spacing: 2px; color: #555; transition: 0.3s; }
        .tab.active { background: #fff; color: #000; border-color: #fff; font-weight: bold; }

        #gallery-container { padding: 40px 5%; min-height: 600px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

    <nav><a href="/" class="logo">NOFACE</a></nav>

    <div id="hero-bg" class="event-hero">
        <div class="hero-content">
            <p id="event-date">JULY 2024</p>
            <h1 id="event-title">DUBAI</h1>
        </div>
    </div>

    <div class="event-tabs">
        <div id="btn-dubai" class="tab active" onclick="updateView('DUBAI', 'JULY 2024', 'dubai2024', 'https://res.cloudinary.com/dlrqcpsgi/image/upload/v1/dubai2024/cover', this)">Dubai</div>
        <div id="btn-london" class="tab" onclick="updateView('LONDON', 'COMING SOON', 'london2024', '', this)">London</div>
    </div>

    <div id="gallery-container"></div>

    <script type="text/javascript">  
        function updateView(title, date, tag, coverUrl, element) {
            // Update Text & Cover Image
            document.getElementById('event-title').innerText = title;
            document.getElementById('event-date').innerText = date;
            if(coverUrl) {
                document.getElementById('hero-bg').style.backgroundImage = `url('${coverUrl}')`;
            } else {
                document.getElementById('hero-bg').style.backgroundImage = 'none';
            }
            
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            element.classList.add('active');

            document.getElementById('gallery-container').innerHTML = "";
            
            const myGallery = cloudinary.galleryWidget({ 
                container: "#gallery-container", 
                cloudName: "dlrqcpsgi", 
                mediaAssets: [{ tag: tag }],
                displayProps: { mode: "masonry", columns: 4, spacing: 15 },
                zoomProps: { type: "popup", theme: "dark" },
                aspectRatio: "1:1"
            }); 
            myGallery.render(); 
        }
        
        // Load Dubai by default
        window.onload = () => updateView('DUBAI', 'JULY 2024', 'dubai2024', 'https://res.cloudinary.com/dlrqcpsgi/image/upload/v1/dubai2024/cover', document.getElementById('btn-dubai'));
    </script> 
</body>
</html>
