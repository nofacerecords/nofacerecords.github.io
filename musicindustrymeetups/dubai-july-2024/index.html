<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hutong Dubai | MIM Gallery</title>
    <style>
        :root { --bg: #000000; --text: #ffffff; --border: #333333; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; letter-spacing: -0.02em; }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 25px 5%; position: fixed; width: 100%; top: 0; z-index: 1000; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); }
        .logo { font-size: 1.1rem; font-weight: 800; letter-spacing: 0.3em; text-transform: uppercase; text-decoration: none; color: white; }

        .header-section { padding: 140px 5% 40px; border-bottom: 1px solid var(--border); }
        .back-btn { color: #666; text-decoration: none; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; display: inline-block; margin-bottom: 20px; transition: 0.3s; }
        .back-btn:hover { color: #fff; }
        .header-section h1 { font-size: clamp(2.5rem, 8vw, 4rem); text-transform: uppercase; font-weight: 900; line-height: 1; }

        .gallery-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 10px; 
            padding: 20px 5%;
        }

        @media (max-width: 1100px) { .gallery-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 700px) { .gallery-grid { grid-template-columns: repeat(2, 1fr); } }

        .photo-card { background: #111; border: 1px solid var(--border); aspect-ratio: 1/1; overflow: hidden; position: relative; }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1); opacity: 0; }
        .photo-card img.loaded { opacity: 1; }
        .photo-card:hover img { filter: grayscale(0%); transform: scale(1.05); }

        footer { padding: 80px 5%; text-align: center; color: #444; font-size: 0.6rem; text-transform: uppercase; border-top: 1px solid var(--border); letter-spacing: 2px; }
    </style>
</head>
<body>

    <nav><a href="/" class="logo">NOFACE</a></nav>

    <div class="header-section">
        <a href="/musicindustrymeetups" class="back-btn">← Back to Events</a>
        <h1>HUTONG DUBAI</h1>
        <p style="color: #666; text-transform: uppercase; font-size: 0.75rem; margin-top: 10px; letter-spacing: 2px;">JULY 2024 // 324 PHOTOS</p>
    </div>

    <div id="gallery" class="gallery-grid">
        </div>

    <footer>&copy; 2026 NOFACE RECORDS</footer>

    <script>
        const gallery = document.getElementById('gallery');
        const totalPhotos = 324;
        
        // This is the base link for your folder's "Raw" images
        // Note: For 324 unique links, we usually use an array, 
        // but I'll start the grid for you here:
        
        for (let i = 1; i <= totalPhotos; i++) {
            const card = document.createElement('div');
            card.className = 'photo-card';
            
            const img = document.createElement('img');
            img.loading = 'lazy'; // PERFORMANCE: Only loads as you scroll
            
            // Placeholder: You will need to replace this with your actual Dropbox Direct Link array
            // For now, I'm setting up the structure.
            img.src = ""; 
            
            img.onload = () => img.classList.add('loaded');
            
            card.appendChild(img);
            gallery.appendChild(card);
        }
    </script>
</body>
</html>
