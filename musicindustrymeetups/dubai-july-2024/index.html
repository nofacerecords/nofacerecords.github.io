<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dubai July 2024 | MIM Gallery</title>
    <style>
        :root { --bg: #000000; --text: #ffffff; --border: #333333; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 25px 5%; position: fixed; width: 100%; top: 0; z-index: 1000; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); }
        .logo { font-size: 1.1rem; font-weight: 800; letter-spacing: 0.3em; text-transform: uppercase; text-decoration: none; color: white; }
        
        .header { padding: 120px 5% 40px; border-bottom: 1px solid var(--border); }
        .header h1 { font-size: 2rem; text-transform: uppercase; margin-bottom: 10px; }
        .back-link { color: #888; text-decoration: none; font-size: 0.8rem; text-transform: uppercase; }

        /* THE 5-COLUMN GALLERY */
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 10px; 
            padding: 20px 5%;
        }

        @media (max-width: 1000px) { .gallery { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 600px) { .gallery { grid-template-columns: repeat(2, 1fr); } }

        .gallery img { 
            width: 100%; 
            aspect-ratio: 1/1; 
            object-fit: cover; 
            border: 1px solid var(--border);
            filter: grayscale(100%);
            transition: 0.3s;
        }
        .gallery img:hover { filter: grayscale(0%); border-color: #fff; }

        footer { padding: 40px; text-align: center; color: #444; font-size: 0.6rem; text-transform: uppercase; }
    </style>
</head>
<body>
    <nav><a href="/" class="logo">NOFACE</a></nav>

    <div class="header">
        <a href="/musicindustrymeetups" class="back-link">← Back to Events</a>
        <h1>Hutong Dubai</h1>
        <p style="color:#666; text-transform: uppercase; font-size: 0.7rem;">July 2024 Gallery</p>
    </div>

    <div class="gallery">
        <img src="https://www.dropbox.com/scl/fi/8r5i3nct759b7m8p91vbe/MIM-Dubai-1.jpg?rlkey=l67hkc6uujp0luurwoq5dlopt&raw=1">
        <img src="https://www.dropbox.com/scl/fi/f0v5vpt5yptf9z8f8f8f/MIM-Dubai-2.jpg?rlkey=l67hkc6uujp0luurwoq5dlopt&raw=1">
        <img src="https://www.dropbox.com/scl/fi/v5v5vpt5yptf9z8f8f8f/MIM-Dubai-3.jpg?rlkey=l67hkc6uujp0luurwoq5dlopt&raw=1">
        </div>

    <footer>&copy; 2026 NOFACE RECORDS</footer>
</body>
</html>
