<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dubai July 2024 | MIM Gallery</title>
    <style>
        :root { --bg: #000000; --text: #ffffff; --border: #333333; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; letter-spacing: -0.02em; }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 25px 5%; position: fixed; width: 100%; top: 0; z-index: 1000; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); }
        .logo { font-size: 1.1rem; font-weight: 800; letter-spacing: 0.3em; text-transform: uppercase; text-decoration: none; color: white; }

        .header-section { padding: 120px 5% 40px; border-bottom: 1px solid var(--border); }
        .back-btn { color: #666; text-decoration: none; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; display: inline-block; margin-bottom: 20px; transition: 0.3s; }
        .back-btn:hover { color: #fff; }
        .header-section h1 { font-size: 2.5rem; text-transform: uppercase; font-weight: 900; }

        /* ELITE 5-COLUMN GRID */
        .gallery-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 10px; 
            padding: 20px 5%;
        }

        /* Responsive scaling */
        @media (max-width: 1100px) { .gallery-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 700px) { .gallery-grid { grid-template-columns: repeat(2, 1fr); } }

        .photo-card { background: #0a0a0a; border: 1px solid var(--border); aspect-ratio: 1/1; overflow: hidden; }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); transition: 0.5s; cursor: pointer; }
        .photo-card img:hover { filter: grayscale(0%); transform: scale(1.05); }

        footer { padding: 60px 5%; text-align: center; color: #444; font-size: 0.6rem; text-transform: uppercase; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="logo">NOFACE</a>
    </nav>

    <div class="header-section">
        <a href="/musicindustrymeetups" class="back-btn">← Back to Events</a>
        <h1>Hutong Dubai</h1>
        <p style="color: #666; text-transform: uppercase; font-size: 0.75rem; margin-top: 5px;">July 2024 // Industry Meetup Gallery</p>
    </div>

    <div class="gallery-grid">
