<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hutong Dubai | MIM Gallery</title>
    <style>
        :root { --bg: #000000; --text: #ffffff; --border: #333333; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; letter-spacing: -0.02em; overflow-x: hidden; }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 25px 5%; position: fixed; width: 100%; top: 0; z-index: 1000; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); }
        .logo { font-size: 1.1rem; font-weight: 800; letter-spacing: 0.3em; text-transform: uppercase; text-decoration: none; color: white; }

        .header-section { padding: 140px 5% 40px; border-bottom: 1px solid var(--border); }
        .back-btn { color: #666; text-decoration: none; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; display: inline-block; margin-bottom: 20px; transition: 0.3s; }
        .back-btn:hover { color: #fff; }
        .header-section h1 { font-size: clamp(2rem, 8vw, 4rem); text-transform: uppercase; font-weight: 900; line-height: 1; }

        /* THE ELITE 5-COLUMN GRID */
        .gallery-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 10px; 
            padding: 20px 5%;
        }

        @media (max-width: 1100px) { .gallery-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 700px) { .gallery-grid { grid-template-columns: repeat(2, 1fr); } }

        .photo-card { background: #0a0a0a; border: 1px solid var(--border); aspect-ratio: 1/1; overflow: hidden; cursor: pointer; }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .photo-card:hover img { filter: grayscale(0%); transform: scale(1.08); }

        /* LIGHTBOX EFFECT */
        #lightbox {
            display: none;
            position: fixed;
            z-index: 9999;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
            padding: 40px;
        }
        #lightbox img { max-width: 100%; max-height: 100%; box-shadow: 0 0 50px rgba(0,0,0,0.5); border: 1px solid #333; }
        #lightbox:target { display: flex; }
        .close-lightbox { position: absolute; top: 20px; right: 30px; color: white; font-size: 30px; text-decoration: none; font-weight: 200; }

        footer { padding: 80px 5%; text-align: center; color: #444; font-size: 0.6rem; text-transform: uppercase; border-top: 1px solid var(--border); letter-spacing: 2px; }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="logo">NOFACE</a>
    </nav>

    <div class="header-section">
        <a href="/musicindustrymeetups" class="back-btn">← Back to Events</a>
        <h1>HUTONG DUBAI</h1>
        <p style="color: #666; text-transform: uppercase; font-size: 0.75rem; margin-top: 10px; letter-spacing: 2px;">JULY 2024 // INDUSTRY MEETUP GALLERY</p>
    </div>

    <div class="gallery-grid">
        <a href="#img1" class="photo-card"><img src="https://www.dropbox.com/scl/fi/8r5i3nct759b7m8p91vbe/MIM-Dubai-1.jpg?rlkey=l67hkc6uujp0luurwoq5dlopt&raw=1"></a>
        <a href="#img2" class="photo-card"><img src="https://www.dropbox.com/scl/fi/f0v5vpt5yptf9z8f8f8f/MIM-Dubai-2.jpg?rlkey=l67hkc6uujp0luurwoq5dlopt&raw=1"></a>
        <a href="#img3" class="photo-card"><img src="https://www.dropbox.com/scl/fi/v5v5vpt5yptf9z8f8f8f/MIM-Dubai-3.jpg?rlkey=l67hkc6uujp0luurwoq5dlopt&raw=1"></a>
        </div>

    <div id="img1" class="lightbox-target">
        <div id="lightbox">
            <a href="#" class="close-lightbox">&times;</a>
            <img src="https://www.dropbox.com/scl/fi/8r5i3nct759b7m8p91vbe/MIM-Dubai-1.jpg?rlkey=l67hkc6uujp0luurwoq5dlopt&raw=1">
        </div>
    </div>
    <div id="img2" class="lightbox-target">
        <div id="lightbox">
            <a href="#" class="close-lightbox">&times;</a>
            <img src="https://www.dropbox.com/scl/fi/f0v5vpt5yptf9z8f8f8f/MIM-Dubai-2.jpg?rlkey=l67hkc6uujp0luurwoq5dlopt&raw=1">
        </div>
    </div>

    <footer>&copy; 2026 NOFACE RECORDS</footer>

    <script>
        // Simple script to handle lightbox closing when clicking background
        document.querySelectorAll('#lightbox').forEach(lb => {
            lb.addEventListener('click', (e) => {
                if(e.target === lb) window.location.hash = '#';
            });
        });
    </script>

</body>
</html>
