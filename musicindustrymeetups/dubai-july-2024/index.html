<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hutong Dubai | MIM Gallery</title>
    <style>
        :root { --bg: #000; --text: #fff; --border: #333; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        nav { padding: 25px 5%; position: fixed; width: 100%; top: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid var(--border); }
        .logo { font-size: 1.1rem; font-weight: 800; letter-spacing: 0.3em; text-decoration: none; color: #fff; }

        .header { padding: 140px 5% 40px; border-bottom: 1px solid var(--border); }
        .back { color: #666; text-decoration: none; font-size: 10px; text-transform: uppercase; margin-bottom: 15px; display: block; }
        h1 { font-size: clamp(2.5rem, 8vw, 4rem); font-weight: 900; text-transform: uppercase; line-height: 1; }

        .gallery-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 10px; 
            padding: 20px 5%;
        }

        .photo-card { background: #111; aspect-ratio: 1/1; overflow: hidden; border: 1px solid var(--border); }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); transition: 0.5s; opacity: 0; }
        .photo-card img.loaded { opacity: 1; }
        .photo-card:hover img { filter: grayscale(0); transform: scale(1.05); }

        footer { padding: 80px 5%; text-align: center; color: #444; font-size: 10px; text-transform: uppercase; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

    <nav><a href="/" class="logo">NOFACE</a></nav>

    <div class="header">
        <a href="/musicindustrymeetups" class="back">← Back to Events</a>
        <h1>HUTONG DUBAI</h1>
        <p style="color: #666; font-size: 12px; margin-top: 10px; letter-spacing: 2px;">JULY 2024 // 324 PHOTOS</p>
    </div>

    <div id="gallery" class="gallery-grid">
        </div>

    <footer>&copy; 2026 NOFACE RECORDS</footer>

    <script>
        const gallery = document.getElementById('gallery');
        const totalPhotos = 324;
        
        // This is your unique folder key from Dropbox
        const folderBase = "https://dl.dropboxusercontent.com/scl/fo/4cv8omhn96ebmcrdjuzu8/AEogDBE8ti85b9UkW4Sn4Kk";
        const rlkey = "l67hkc6uujp0luurwoq5dlopt";

        for (let i = 1; i <= totalPhotos; i++) {
            const card = document.createElement('div');
            card.className = 'photo-card';
            
            const img = document.createElement('img');
            // This assumes your photos are named 1.jpg, 2.jpg, etc.
            img.src = `${folderBase}/${i}.jpg?rlkey=${rlkey}&raw=1`;
            img.loading = "lazy"; // Only loads when you scroll to it (saves data)
            
            img.onload = () => img.classList.add('loaded');
            
            // If the image doesn't exist, hide the box so it doesn't look broken
            img.onerror = () => card.style.display = 'none';

            card.appendChild(img);
            gallery.appendChild(card);
        }
    </script>
</body>
</html>
